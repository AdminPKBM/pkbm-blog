<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PKBM Digital Blog</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {font-family:Inter;margin:0;background:#f8fafc}
.container {max-width:1200px;margin:auto;padding:20px}
.grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}

.card {background:#fff;border-radius:12px;overflow:hidden;border:1px solid #ddd}
.card img {width:100%;height:180px;object-fit:cover}
.card-content {padding:15px}
.btn {color:#2563eb;text-decoration:none;font-weight:bold}

.skeleton {height:250px;background:#eee;border-radius:10px}

</style>
</head>

<body>

<div class="container">
<h1>PKBM Digital</h1>

<input type="text" id="search" placeholder="Cari artikel..." style="padding:10px;width:100%;margin-bottom:20px">

<div id="grid" class="grid"></div>
</div>

<script>
const USERNAME = 'AdminPKBM';
const REPO = 'pkbm-blog';
const PATH = 'artikel';

let allArticles = [];

// placeholder kalau gambar tidak ada
const PLACEHOLDER = "https://via.placeholder.com/400x200?text=PKBM+Digital";

async function loadArticles(){
    const grid = document.getElementById('grid');

    // loading
    grid.innerHTML = Array(6).fill('<div class="skeleton"></div>').join('');

    try {
        const res = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${PATH}`);
        const data = await res.json();

        allArticles = data.filter(f => f.name.endsWith('.html'));
        renderArticles(allArticles);

    } catch (err){
        grid.innerHTML = "<p>Gagal memuat artikel</p>";
    }
}

function renderArticles(list){
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    list.forEach(file => {
        const slug = file.name.replace('.html','');
        const title = slug.replace(/-/g,' ');

        const img = `https://raw.githubusercontent.com/${USERNAME}/${REPO}/main/${PATH}/${slug}.jpg`;

        grid.innerHTML += `
        <div class="card">
            <img src="${img}" loading="lazy"
            onerror="this.src='${PLACEHOLDER}'">
            <div class="card-content">
                <h3>${title}</h3>
                <p>Pelajari ${title} secara lengkap.</p>
                <a class="btn" href="${PATH}/${file.name}">Baca →</a>
            </div>
        </div>
        `;
    });
}

// search
document.getElementById('search').addEventListener('input', function(){
    const keyword = this.value.toLowerCase();
    const filtered = allArticles.filter(a => a.name.toLowerCase().includes(keyword));
    renderArticles(filtered);
});

window.onload = loadArticles;
</script>

</body>
</html>
