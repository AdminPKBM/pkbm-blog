<!DOCTYPE html> <html lang="id"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- SEO --> <title>PKBM Digital Blog - Portal Edukasi Paket C & Kesetaraan</title> <meta name="description" content="Portal edukasi PKBM: tips lulus Paket C, strategi belajar, latihan soal, dan panduan sukses ujian kesetaraan."> <meta name="keywords" content="PKBM, Paket C, Belajar PKBM, Ujian Kesetaraan, Tips Lulus Paket C"> <!-- Open Graph --> <meta property="og:title" content="PKBM Digital Blog"> <meta property="og:description" content="Belajar tanpa batas untuk masa depan lebih cerah"> <meta property="og:type" content="website"> <!-- Fonts --> <link rel="preconnect" href="https://fonts.googleapis.com"> <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"> <style> :root { --primary:#0f172a; --accent:#2563eb; --bg:#f8fafc; --card:#ffffff; --text:#1e293b; --muted:#64748b; --border:#e2e8f0; --radius:16px; } body { font-family:'Inter',sans-serif; margin:0; background:var(--bg); color:var(--text); } .container {max-width:1200px;margin:auto;padding:0 20px;} /* NAV */ nav { position:sticky;top:0;z-index:100; backdrop-filter:blur(10px); background:rgba(255,255,255,0.8); border-bottom:1px solid var(--border); } .nav-wrapper { display:flex;justify-content:space-between;align-items:center; padding:15px 0; } .logo {font-weight:700;text-decoration:none;color:var(--primary);} .logo span {color:var(--accent);} nav ul {display:flex;gap:20px;list-style:none;margin:0;} nav a {text-decoration:none;color:var(--muted);} /* HEADER */ header { text-align:center; padding:80px 0; background:linear-gradient(135deg,#dbeafe,#f1f5f9); } header h1 {font-size:2.5rem;margin:0;} header p {color:var(--muted);} /* SEARCH */ .search-box { max-width:400px;margin:20px auto; } .search-box input { width:100%;padding:12px;border-radius:10px; border:1px solid var(--border); } /* GRID */ .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:25px; padding:40px 0; } /* CARD */ .card { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; transition:0.3s; } .card:hover { transform:translateY(-5px); border-color:var(--accent); } .card img { width:100%; height:180px; object-fit:cover; } .card-content {padding:20px;} .card h3 {font-size:1.1rem;margin:10px 0;} .card p {font-size:0.9rem;color:var(--muted);} .btn { display:inline-block; margin-top:10px; color:var(--accent); text-decoration:none; font-weight:600; } /* LOADING */ .skeleton { height:250px; border-radius:var(--radius); background:linear-gradient(90deg,#eee,#ddd,#eee); animation:loading 1.5s infinite; } @keyframes loading { 0% {background-position:-200px;} 100% {background-position:200px;} } /* ADS */ .ad { margin:30px auto; border:1px dashed #cbd5e1; padding:20px; text-align:center; color:#94a3b8; } /* FOOTER */ footer { background:#0f172a; color:#94a3b8; padding:40px; text-align:center; } footer a {color:white;text-decoration:none;margin:0 10px;} </style> </head> <body> <nav> <div class="container nav-wrapper"> <a href="#" class="logo">PKBM <span>Digital</span></a> <ul> <li><a href="#">Home</a></li> <li><a href="#">Tentang</a></li> <li><a href="#">Kontak</a></li> </ul> </div> </nav> <header> <div class="container"> <h1>Portal Edukasi PKBM</h1> <p>Belajar Paket C Lebih Mudah, Cepat & Terarah</p> <div class="search-box"> <input type="text" id="search" placeholder="Cari artikel..."> </div> </div> </header> <div class="container"> <div class="ad">Slot Iklan AdSense</div> <div id="grid" class="grid"></div> <div class="ad">Slot Iklan AdSense</div> </div> <footer> <p>&copy; 2026 PKBM Digital</p> <div> <a href="#">Privacy</a> | <a href="#">Disclaimer</a> | <a href="#">Sitemap</a> </div> </footer> <script> const USERNAME = 'AdminPKBM'; const REPO = 'pkbm-blog'; const PATH = 'artikel'; let allArticles = []; async function loadArticles(){ const grid = document.getElementById('grid'); // skeleton loading grid.innerHTML = Array(6).fill('<div class="skeleton"></div>').join(''); try { const res = await fetch(https://api.github.com/repos/${USERNAME}/${REPO}/contents/${PATH}); const data = await res.json(); allArticles = data.filter(f => f.name.endsWith('.html')); renderArticles(allArticles); } catch { grid.innerHTML = "<p>Gagal memuat artikel.</p>"; } } function renderArticles(list){ const grid = document.getElementById('grid'); grid.innerHTML = ''; list.forEach(file => { const slug = file.name.replace('.html',''); const title = slug.replace(/-/g,' '); const img = https://raw.githubusercontent.com/${USERNAME}/${REPO}/main/${PATH}/${slug}.jpg; grid.innerHTML += <div class="card"> <img src="${img}" loading="lazy" onerror="this.style.display='none'"> <div class="card-content"> <h3>${title}</h3> <p>Pelajari ${title} secara lengkap dan mudah dipahami.</p> <a class="btn" href="${PATH}/${file.name}">Baca →</a> </div> </div> ; }); } /* SEARCH */ document.getElementById('search').addEventListener('input', function(){ const keyword = this.value.toLowerCase(); const filtered = allArticles.filter(a => a.name.toLowerCase().includes(keyword)); renderArticles(filtered); }); window.onload = loadArticles; </script> </body> </html>
