<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKBM Blog - Portal Edukasi Masyarakat</title>
    <meta name="description" content="Layanan pendidikan kesetaraan Paket A, B, dan C. Terus belajar tanpa batas usia.">
    
    <style>
        /* CSS SEDERHANA & MODERN */
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --light: #f4f7f6;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
            background-color: var(--light);
            color: var(--text);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navigasi */
        nav {
            background: var(--primary);
            color: white;
            padding: 1rem 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: var(--accent); }

        nav ul {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        nav ul li { margin-left: 20px; }
        nav ul li a { color: white; text-decoration: none; font-size: 0.9rem; }

        /* Hero Section */
        header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            text-align: center;
            padding: 80px 0;
        }

        header h1 { margin: 0; font-size: 2.5rem; }

        /* Grid Artikel */
        main { padding: 40px 0; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-5px); }

        .card h3 { 
            margin-top: 10px; 
            color: var(--primary);
            text-transform: capitalize; 
        }

        .card p { font-size: 0.95rem; color: #666; flex-grow: 1; }

        .btn-link {
            display: inline-block;
            margin-top: 15px;
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        .btn-link:hover { border-bottom: 2px solid var(--accent); }

        /* Footer */
        footer {
            background: #222;
            color: #ccc;
            text-align: center;
            padding: 30px 0;
            margin-top: 50px;
        }

        footer a { color: white; text-decoration: none; margin: 0 10px; font-size: 0.85rem; }

        /* Loading Animation */
        #loading { text-align: center; width: 100%; font-style: italic; color: #888; }
    </style>
</head>
<body>

    <nav>
        <div class="container nav-wrapper">
            <div class="logo">PKBM <span>Digital</span></div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">Tentang</a></li>
                <li><a href="contact.html">Kontak</a></li>
            </ul>
        </div>
    </nav>

    <header>
        <div class="container">
            <h1>Portal Edukasi PKBM</h1>
            <p>Informasi Terkini Pendidikan Kesetaraan & Pemberdayaan</p>
        </div>
    </header>

    <main class="container">
        <h2 style="margin-bottom: 30px; border-left: 5px solid var(--accent); padding-left: 15px;">Artikel Terbaru</h2>
        <div id="article-grid" class="grid">
            <div id="loading">Menghubungkan ke server GitHub...</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 PKBM Blog | Dikelola secara Digital</p>
            <p>
                <a href="privacy.html">Privacy Policy</a> | 
                <a href="disclaimer.html">Disclaimer</a> | 
                <a href="sitemap.xml">Sitemap</a>
            </p>
        </div>
    </footer>

    <script>
        // KONFIGURASI GITHUB ANDA
        const USERNAME = 'AdminPKBM';
        const REPO = 'pkbm-blog';
        const FOLDER_PATH = 'artikel';

        async function loadArticles() {
            const grid = document.getElementById('article-grid');
            
            try {
                // Fetch data dari GitHub API
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FOLDER_PATH}`);
                
                if (!response.ok) throw new Error('Gagal mengambil data');

                const files = await response.json();
                grid.innerHTML = ''; // Hapus pesan loading

                // Filter hanya file .html
                const htmlFiles = files.filter(file => file.name.endsWith('.html'));

                if (htmlFiles.length === 0) {
                    grid.innerHTML = '<p>Belum ada artikel yang diterbitkan.</p>';
                    return;
                }

                htmlFiles.forEach(file => {
                    // Format nama file jadi judul (contoh: cara-daftar.html -> Cara Daftar)
                    const displayTitle = file.name
                        .replace('.html', '')
                        .replace(/-/g, ' ')
                        .replace(/_/g, ' ');

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>${displayTitle}</h3>
                        <p>Informasi terbaru mengenai ${displayTitle} di PKBM Digital untuk tahun ajaran 2026.</p>
                        <a href="artikel/${file.name}" class="btn-link">Baca Selengkapnya →</a>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                grid.innerHTML = '<p style="color:red;">Gagal memuat artikel secara otomatis. Pastikan koneksi internet aktif dan folder "artikel" tersedia di GitHub.</p>';
            }
        }

        // Jalankan saat halaman siap
        window.onload = loadArticles;
    </script>
</body>
</html>
