<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKBM Blog - Portal Edukasi Modern</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* --- NAVIGASI --- */
        nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
        }
        .nav-wrapper { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.4rem; font-weight: 700; text-decoration: none; color: var(--primary); }
        .logo span { color: var(--accent); }
        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; }
        nav ul li a { text-decoration: none; color: var(--text-muted); font-weight: 500; font-size: 0.9rem; }

        /* --- HEADER --- */
        header {
            padding: 80px 0;
            text-align: center;
            background: radial-gradient(circle at top right, #e0f2fe, transparent), 
                        radial-gradient(circle at bottom left, #f1f5f9, transparent);
        }
        header h1 { font-size: 2.8rem; letter-spacing: -1px; margin-bottom: 10px; }
        header p { color: var(--text-muted); font-size: 1.1rem; }

        /* --- ADSENSE SLOT --- */
        .ad-slot {
            max-width: 970px; margin: 20px auto;
            background: #f1f5f9; border: 1px dashed #cbd5e1;
            border-radius: 8px; min-height: 90px;
            display: flex; align-items: center; justify-content: center;
            color: #94a3b8; font-size: 0.8rem;
        }

        /* --- GRID & CARD --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            padding: 40px 0;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }

        /* Thumbnail Image Style */
        .card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); /* Fallback gradient */
        }

        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-category { font-size: 0.7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .card h3 { font-size: 1.2rem; margin-bottom: 12px; line-height: 1.4; }
        .card p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; flex-grow: 1; }
        
        .btn-read {
            font-size: 0.9rem; font-weight: 600; color: var(--accent);
            text-decoration: none; display: flex; align-items: center; gap: 5px;
        }

        /* --- FOOTER --- */
        footer { background: #0f172a; color: #94a3b8; padding: 50px 0; text-align: center; margin-top: 40px; }
        .footer-links a { color: white; text-decoration: none; margin: 0 10px; font-size: 0.85rem; }

        @media (max-width: 640px) {
            header h1 { font-size: 2rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="container nav-wrapper">
            <a href="#" class="logo">PKBM <span>Digital</span></a>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Tentang</a></li>
                <li><a href="#">Kontak</a></li>
            </ul>
        </div>
    </nav>

    <header>
        <div class="container">
            <h1>Portal Edukasi PKBM</h1>
            <p>Pendidikan Kesetaraan untuk Masa Depan Lebih Cerah</p>
        </div>
    </header>

    <div class="container">
        <div class="ad-slot">Iklan AdSense Leaderboard</div>

        <div id="article-grid" class="grid">
            <div style="text-align: center; grid-column: 1/-1; padding: 50px; color: #64748b;">Memuat artikel...</div>
        </div>

        <div class="ad-slot">Iklan AdSense In-Article</div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-links">
                <a href="#">Privacy Policy</a> | <a href="#">Disclaimer</a> | <a href="#">Sitemap</a>
            </div>
            <p style="margin-top: 15px;">&copy; 2026 PKBM Digital Blog</p>
        </div>
    </footer>

    <script>
        const USERNAME = 'AdminPKBM';
        const REPO = 'pkbm-blog';
        const FOLDER_PATH = 'artikel';

        async function loadArticles() {
            const grid = document.getElementById('article-grid');
            
            try {
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FOLDER_PATH}`);
                if (!response.ok) throw new Error();
                const files = await response.json();
                
                grid.innerHTML = ''; 
                const htmlFiles = files.filter(f => f.name.endsWith('.html'));

                htmlFiles.forEach(file => {
                    const slug = file.name.replace('.html', '');
                    const displayTitle = slug.replace(/-/g, ' ').replace(/_/g, ' ');

                    // LOGIKA THUMBNAIL:
                    // Kita asumsikan gambar ada di folder yang sama dengan format .jpg
                    // Jika tidak ada, fungsi onerror akan menangani (fallback ke warna solid)
                    const thumbUrl = `https://raw.githubusercontent.com/${USERNAME}/${REPO}/main/${FOLDER_PATH}/${slug}.jpg`;

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img class="card-image" src="${thumbUrl}" alt="${displayTitle}" 
                             onerror="this.style.display='none'; this.parentElement.classList.add('no-image');">
                        <div class="card-content">
                            <span class="card-category">Pendidikan</span>
                            <h3>${displayTitle}</h3>
                            <p>Pelajari lebih lanjut mengenai ${displayTitle} untuk mendukung proses belajar Anda di PKBM.</p>
                            <a href="${FOLDER_PATH}/${file.name}" class="btn-read">Baca Artikel &rarr;</a>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (e) {
                grid.innerHTML = '<p>Gagal memuat artikel.</p>';
            }
        }

        window.onload = loadArticles;
    </script>
</body>
</html>
