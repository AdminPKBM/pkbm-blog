<script>
const USERNAME = 'AdminPKBM';
const REPO = 'pkbm-blog';
const PATH = 'artikel';
let allArticles = [];

const IMG_FORMATS = ['.jpg', '.png', '.jpeg', '.webp'];
const PLACEHOLDER = 'https://via.placeholder.com/400x200?text=PKBM+Digital';

async function loadArticles() {
    const grid = document.getElementById('grid');

    // skeleton loading
    grid.innerHTML = Array(6).fill('<div class="skeleton"></div>').join('');

    try {
        const res = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${PATH}`);
        if(!res.ok) throw new Error('Gagal fetch');
        const data = await res.json();

        allArticles = data.filter(f => f.name.endsWith('.html'));

        renderArticles(allArticles);

    } catch (err) {
        grid.innerHTML = "<p>Gagal memuat artikel.</p>";
        console.error(err);
    }
}

function renderArticles(list) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    list.forEach(file => {
        const slug = file.name.replace('.html', '');
        const title = slug.replace(/-/g, ' ');

        // Buat URL gambar fallback otomatis
        let imgUrl = PLACEHOLDER;

        IMG_FORMATS.forEach(ext => {
            const url = `https://raw.githubusercontent.com/${USERNAME}/${REPO}/main/${PATH}/${slug}${ext}`;
            fetch(url, { method: 'HEAD' })
                .then(res => {
                    if(res.ok) {
                        imgUrl = url;
                        const imgEl = document.getElementById('img-'+slug);
                        if(imgEl) imgEl.src = imgUrl;
                    }
                }).catch(()=>{});
        });

        grid.innerHTML += `
        <div class="card">
            <img id="img-${slug}" src="${PLACEHOLDER}" loading="lazy" alt="${title}">
            <div class="card-content">
                <h3>${title}</h3>
                <p>Pelajari ${title} secara lengkap dan mudah dipahami.</p>
                <a class="btn" href="${PATH}/${file.name}">Baca →</a>
            </div>
        </div>
        `;
    });
}

// SEARCH
document.getElementById('search').addEventListener('input', function(){
    const keyword = this.value.toLowerCase();
    const filtered = allArticles.filter(a => a.name.toLowerCase().includes(keyword));
    renderArticles(filtered);
});

window.onload = loadArticles;
</script>
